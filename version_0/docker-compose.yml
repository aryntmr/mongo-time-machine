services:
  mongo1:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo2:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo3:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo-setup:
    image: mongo:7
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    volumes:
      - ./mongo-init/init.sh:/init.sh
    entrypoint: ["bash", "/init.sh"]
