services:
  mongo1:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo2:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo3:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      retries: 10

  mongo-setup:
    image: mongo:7
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    volumes:
      - ./mongo-init/init.sh:/init.sh
    entrypoint: ["bash", "/init.sh"]

  # ── Pipeline services (profile: pipeline) ─────────────────────────────────────
  # Start with: docker compose --profile pipeline up -d
  # (default `docker compose up` starts only MongoDB, preserving existing workflow)

  listener:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: Dockerfile.listener
    image: ${GAR_LOCATION:-us-central1}-docker.pkg.dev/${GCP_PROJECT_ID}/vali-pipeline/listener:latest
    env_file: .env
    environment:
      # SA key for local dev — on Cloud Run, Workload Identity is used instead
      - GOOGLE_APPLICATION_CREDENTIALS=/run/sa-key/key.json
      # MONGO_URI comes from .env (set by bootstrap.sh from config.yaml).
      # For local Docker MongoDB use: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
      # For MongoDB Atlas use:        mongodb+srv://<user>:<pass>@<cluster>.mongodb.net/
    volumes:
      - ./service-account-key.json:/run/sa-key/key.json:ro
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: unless-stopped

  subscriber:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: Dockerfile.subscriber
    image: ${GAR_LOCATION:-us-central1}-docker.pkg.dev/${GCP_PROJECT_ID}/vali-pipeline/subscriber:latest
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/run/sa-key/key.json
    volumes:
      - ./service-account-key.json:/run/sa-key/key.json:ro
    restart: unless-stopped

  # ── Tools container (profile: tools) ──────────────────────────────────────────
  # Bundles gcloud CLI, Terraform, Docker CLI, and Python so Jason only needs
  # Docker Desktop. All make targets that previously required those tools now
  # run inside this container.
  #
  # Volume mounts:
  #   .:/workspace          — source files (bootstrap.sh, deploy.sh, *.py, etc.)
  #   ../infra:/infra       — Terraform configs (accessible as /infra or ../infra)
  #   docker.sock           — lets `docker build` / `docker push` use the host daemon
  #   ~/.config/gcloud      — persists gcloud auth credentials across container runs
  #   ~/.docker             — persists Docker credential helper config across runs
  #
  # env_file required:false — safe to start before .env exists (bootstrap creates it)

  tools:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.tools
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ../infra:/infra
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.config/gcloud:/root/.config/gcloud
      - ${HOME}/.docker:/root/.docker
    environment:
      - CLOUDSDK_CONFIG=/root/.config/gcloud
      # Override the SA key path from .env — tools container uses ADC (user credentials),
      # not the service account key file. The SA key is only for listener/subscriber containers.
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      # Force Docker CLI to use the mounted socket, not the macOS context path from ~/.docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true
